# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - copilot-metrics-viewer

on:

  workflow_dispatch:

jobs:

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    permissions:
      contents: read

    steps:
    # App settings (NUXT_PUBLIC_IS_DATA_MOCKED, NUXT_PUBLIC_SCOPE, etc.) are
    # configured directly in the Azure Portal under Configuration > App Settings.
    # They do not need to be set here — publish-profile auth doesn't support az cli.
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'copilot-metrics-viewer'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_e94dfd38811a421eafe5ce4eee13b68b }}
        images: 'ghcr.io/github-copilot-resources/copilot-metrics-viewer:main'
