name: Preview Deploy

on:
  pull_request:
    types: [labeled, unlabeled, synchronize]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name of the PR to deploy or clean up'
        required: true
        type: string
      action:
        description: 'Action to perform'
        type: choice
        options:
          - deploy
          - cleanup
        default: deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'deploy') ||
      (github.event_name == 'pull_request' && github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'deploy')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')

    permissions:
      contents: read
      packages: write

    outputs:
      pr_number: ${{ steps.resolve-pr.outputs.pr_number }}

    steps:
      - name: Resolve PR number
        id: resolve-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER=$(gh pr list --head "${{ github.event.inputs.branch }}" --repo "${{ github.repository }}" --json number -q '.[0].number') \
              || { echo "Failed to find open PR for branch '${{ github.event.inputs.branch }}'"; exit 1; }
            if [ -z "$PR_NUMBER" ]; then
              echo "No open PR found for branch '${{ github.event.inputs.branch }}'"; exit 1
            fi
            PR_HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid -q .headRefOid)
            echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "pr_head_sha=${PR_HEAD_SHA}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "pr_head_sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-pr.outputs.pr_head_sha }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-preview:preview-pr-${{ steps.resolve-pr.outputs.pr_number }}

      - name: Build and push sync image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.sync
          push: true
          tags: ghcr.io/${{ github.repository }}-sync-preview:preview-pr-${{ steps.resolve-pr.outputs.pr_number }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'deploy') ||
      (github.event_name == 'pull_request' && github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'deploy')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')

    permissions:
      id-token: write
      contents: read
      packages: write
      pull-requests: write
      deployments: write

    environment:
      name: preview
      url: ${{ steps.app-url.outputs.url }}

    env:
      PR_NUMBER: ${{ needs.build-and-push.outputs.pr_number }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create ACA Environment
        run: |
          az containerapp env create \
            --name cmv-preview-pr-${{ env.PR_NUMBER }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --location ${{ secrets.AZURE_LOCATION }} \
            || true

      - name: Generate PostgreSQL password
        id: pgpass
        run: |
          PGPASSWORD=$(openssl rand -base64 32 | tr -dc 'a-zA-Z0-9' | head -c 32)
          echo "::add-mask::$PGPASSWORD"
          echo "pgpassword=$PGPASSWORD" >> $GITHUB_OUTPUT

      - name: Deploy PostgreSQL container
        run: |
          az containerapp create \
            --name cmv-db \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --environment cmv-preview-pr-${{ env.PR_NUMBER }} \
            --image postgres:15-alpine \
            --min-replicas 1 --max-replicas 1 \
            --ingress internal --transport tcp --target-port 5432 \
            --env-vars \
              POSTGRES_DB=copilot_metrics \
              POSTGRES_USER=metrics_user \
              POSTGRES_PASSWORD=${{ steps.pgpass.outputs.pgpassword }}

      - name: Build DATABASE_URL
        id: dburl
        run: |
          DB_FQDN=$(az containerapp show \
            --name cmv-db \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)
          DATABASE_URL="postgresql://metrics_user:${{ steps.pgpass.outputs.pgpassword }}@${DB_FQDN}:5432/copilot_metrics"
          echo "::add-mask::$DATABASE_URL"
          echo "database_url=${DATABASE_URL}" >> $GITHUB_OUTPUT

      - name: Deploy app container
        run: |
          az containerapp create \
            --name cmv-app \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --environment cmv-preview-pr-${{ env.PR_NUMBER }} \
            --image ghcr.io/${{ github.repository }}-preview:preview-pr-${{ env.PR_NUMBER }} \
            --ingress external --target-port 80 \
            --min-replicas 1 --max-replicas 1 \
            --env-vars \
              NUXT_SESSION_PASSWORD=${{ secrets.NUXT_SESSION_PASSWORD }} \
              NUXT_GITHUB_TOKEN=${{ secrets.PREVIEW_GITHUB_TOKEN }} \
              DATABASE_URL=${{ steps.dburl.outputs.database_url }} \
              ENABLE_HISTORICAL_MODE=true \
              SYNC_ENABLED=false \
              NUXT_PUBLIC_IS_DATA_MOCKED=false \
              NUXT_PUBLIC_SCOPE=${{ secrets.PREVIEW_SCOPE || 'organization' }} \
              NUXT_PUBLIC_GITHUB_ORG=${{ secrets.PREVIEW_GITHUB_ORG }}

      - name: Restrict app ingress to allowed IPs
        if: ${{ secrets.PREVIEW_ALLOWED_IPS != '' }}
        run: |
          az containerapp ingress access-restriction set \
            --name cmv-app \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --rule-name allow-preview-ips \
            --ip-address "${{ secrets.PREVIEW_ALLOWED_IPS }}" \
            --action Allow

      - name: Deploy sync container
        run: |
          az containerapp create \
            --name cmv-sync \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --environment cmv-preview-pr-${{ env.PR_NUMBER }} \
            --image ghcr.io/${{ github.repository }}-sync-preview:preview-pr-${{ env.PR_NUMBER }} \
            --min-replicas 0 --max-replicas 1 \
            --env-vars \
              NUXT_GITHUB_TOKEN=${{ secrets.PREVIEW_GITHUB_TOKEN }} \
              DATABASE_URL=${{ steps.dburl.outputs.database_url }} \
              SYNC_ENABLED=true \
              NUXT_PUBLIC_IS_DATA_MOCKED=false \
              NUXT_PUBLIC_SCOPE=${{ secrets.PREVIEW_SCOPE || 'organization' }} \
              NUXT_PUBLIC_GITHUB_ORG=${{ secrets.PREVIEW_GITHUB_ORG }}

      - name: Get app URL
        id: app-url
        run: |
          APP_FQDN=$(az containerapp show \
            --name cmv-app \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)
          echo "url=https://${APP_FQDN}" >> $GITHUB_OUTPUT

      - name: Comment on PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ env.PR_NUMBER }}', 10);
            const url = '${{ steps.app-url.outputs.url }}';
            const body = `## 🚀 Preview Deployment Ready\n\n` +
              `Preview environment for PR #${prNumber} has been deployed.\n\n` +
              `**Preview URL:** ${url}\n\n` +
              `> This preview will be cleaned up when the \`deploy\` label is removed.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

  cleanup:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'unlabeled' && github.event.label.name == 'deploy') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'cleanup')

    permissions:
      id-token: write
      contents: read
      pull-requests: write
      deployments: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.branch }}

    steps:
      - name: Resolve PR number (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.event.inputs.branch }}" --repo "${{ github.repository }}" --json number -q '.[0].number') \
            || { echo "Failed to find PR for branch '${{ github.event.inputs.branch }}'"; exit 1; }
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete app container
        run: |
          az containerapp delete \
            --name cmv-app \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --yes \
            || true

      - name: Delete sync container
        run: |
          az containerapp delete \
            --name cmv-sync \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --yes \
            || true

      - name: Delete PostgreSQL container
        run: |
          az containerapp delete \
            --name cmv-db \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --yes \
            || true

      - name: Delete ACA Environment
        run: |
          az containerapp env delete \
            --name cmv-preview-pr-${{ env.PR_NUMBER }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --yes \
            || true

      - name: Comment on PR about cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ env.PR_NUMBER }}', 10);
            const body = `## 🧹 Preview Environment Cleaned Up\n\n` +
              `The preview environment for PR #${prNumber} has been removed.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });


