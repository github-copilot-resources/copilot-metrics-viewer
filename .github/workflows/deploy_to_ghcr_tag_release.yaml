name: Build and push Docker image with release tag

on:
  
  release:
    types: 
      - published

  # Allows you to run this workflow manually from the Actions tab to re-push images.
  # NOTE: workflow_dispatch does NOT produce semver Docker tags — those require a release event.
  # On manual runs, images are pushed with sha and branch tags only.
  workflow_dispatch:

permissions:
  packages: write
  contents: read
  pull-requests: read

