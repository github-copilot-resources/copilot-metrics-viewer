  #         echo "moving tag ${{ steps.version.outputs.version }}"
  #         git tag --force ${{ steps.version.outputs.version }}
  #         git push origin ${{ steps.version.outputs.version }} --force

  push_to_ghcr:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # needs: version_update
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4
        with:
          # Release event: checkout at the tag.
          # workflow_dispatch re-run: no ref = default branch (latest commit on main).
          # The version-check below ensures package.json still matches the tag.
          ref: ${{ github.event.release.tag_name }}

      # Fail fast if the release tag doesn't match package.json version.
      # Fix: bump the version in a commit before pushing the release tag.
      - name: Verify npm version matches release tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ${{ github.event.release.tag_name }} requires package.json version $TAG but found $PKG. Bump the version before releasing."
            exit 1
          fi
          echo "✓ package.json version $PKG matches tag ${{ github.event.release.tag_name }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ghcr.io/${{ github.repository }}-with-proxy
          labels: |
            org.opencontainers.image.title=copilot-metrics-viewer
            org.opencontainers.image.description=Metrics viewer for GitHub Copilot usage
            org.opencontainers.image.source=${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=true
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          provenance: false

  push_sync_to_ghcr:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4
        with:
          # Release event: checkout at the tag.
          # workflow_dispatch re-run: no ref = default branch (latest commit on main).
          # The version-check below ensures package.json still matches the tag.
          ref: ${{ github.event.release.tag_name }}

      # Fail fast if the release tag doesn't match package.json version.
      - name: Verify npm version matches release tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ${{ github.event.release.tag_name }} requires package.json version $TAG but found $PKG. Bump the version before releasing."
            exit 1
          fi
          echo "✓ package.json version $PKG matches tag ${{ github.event.release.tag_name }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-sync
          labels: |
            org.opencontainers.image.title=copilot-metrics-viewer-sync
            org.opencontainers.image.description=Sync service for GitHub Copilot metrics data
            org.opencontainers.image.source=${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=true
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push sync image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sync
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          provenance: false
