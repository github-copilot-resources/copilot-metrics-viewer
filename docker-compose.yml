# Docker Compose configuration for development
# Includes separate services for web, sync, and database

services:
  # PostgreSQL database (optional - use for production-like testing)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: copilot_metrics
      POSTGRES_USER: metrics_user
      POSTGRES_PASSWORD: metrics_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metrics_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main web application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      # App configuration
      - NUXT_PUBLIC_SCOPE=organization
      - NUXT_PUBLIC_GITHUB_ORG=your-org
      - NUXT_PUBLIC_IS_DATA_MOCKED=true  # Set to false for real data
      - NUXT_SESSION_PASSWORD=at_least_32_characters_long_password_here
      
      # New API flags
      - USE_NEW_API=false  # Enable new API
      - ENABLE_HISTORICAL_MODE=false  # Enable storage queries
      
      # GitHub token (optional if using mock data)
      # - NUXT_GITHUB_TOKEN=your_github_token_here
      
      # Storage configuration (filesystem by default, can use PostgreSQL)
      # - DATABASE_URL=postgresql://metrics_user:metrics_password@db:5432/copilot_metrics
      
      # Disable sync in web container (run separately)
      - SYNC_ENABLED=false
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
      - ./data:/app/.data

  # Sync service (separate container)
  sync:
    build:
      context: .
      dockerfile: Dockerfile.sync
    environment:
      # Scope configuration
      - NUXT_PUBLIC_SCOPE=organization
      - NUXT_PUBLIC_GITHUB_ORG=your-org
      
      # GitHub token
      - NUXT_GITHUB_TOKEN=your_github_token_here
      
      # Sync configuration
      - SYNC_DAYS_BACK=7  # Sync last 7 days on run
      - SYNC_ENABLED=true
      
      # Storage configuration (should match web service)
      # - DATABASE_URL=postgresql://metrics_user:metrics_password@db:5432/copilot_metrics
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/.data
    # Run manually: docker compose run sync
    # Or schedule externally

volumes:
  postgres_data:
