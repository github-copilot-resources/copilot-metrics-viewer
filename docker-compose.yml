# Docker Compose configuration for development
# Includes separate services for web, sync, and database

services:
  # PostgreSQL database (optional - use for production-like testing)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: copilot_metrics
      POSTGRES_USER: metrics_user
      POSTGRES_PASSWORD: metrics_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metrics_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main web application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      # App configuration
      - NUXT_PUBLIC_SCOPE=organization
      - NUXT_PUBLIC_GITHUB_ORG=${NUXT_PUBLIC_GITHUB_ORG:-your-org}
      - NUXT_PUBLIC_IS_DATA_MOCKED=${NUXT_PUBLIC_IS_DATA_MOCKED:-true}
      - NUXT_SESSION_PASSWORD=${NUXT_SESSION_PASSWORD:-at_least_32_characters_long_password_here}
      
      # API mode: "new" (default, download-based) or "legacy" (deprecated, shuts down April 2026)
      - COPILOT_METRICS_API=${COPILOT_METRICS_API:-new}
      - ENABLE_HISTORICAL_MODE=${ENABLE_HISTORICAL_MODE:-false}
      
      # GitHub token (required unless using mock data)
      - NUXT_GITHUB_TOKEN=${NUXT_GITHUB_TOKEN:-}
      
      # Disable sync in web container (run separately via sync service)
      - SYNC_ENABLED=false
    depends_on:
      db:
        condition: service_healthy

  # Sync service (downloads metrics and stores to filesystem)
  sync:
    build:
      context: .
      dockerfile: Dockerfile.sync
    environment:
      - NUXT_PUBLIC_SCOPE=organization
      - NUXT_PUBLIC_GITHUB_ORG=${NUXT_PUBLIC_GITHUB_ORG:-your-org}
      - NUXT_GITHUB_TOKEN=${NUXT_GITHUB_TOKEN:-}
      - NUXT_PUBLIC_IS_DATA_MOCKED=${NUXT_PUBLIC_IS_DATA_MOCKED:-false}
      - COPILOT_METRICS_API=${COPILOT_METRICS_API:-new}
      - SYNC_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - sync_data:/app/.data
    # Run manually: docker compose run sync

  # Playwright E2E tests (mock mode)
  playwright:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        mode: playwright
    environment:
      - NUXT_PUBLIC_IS_DATA_MOCKED=true
      - NUXT_PUBLIC_SCOPE=organization
      - NUXT_PUBLIC_GITHUB_ORG=mocked-org
      - NUXT_SESSION_PASSWORD=at_least_32_characters_long_password_here
      - NITRO_PORT=3000
    volumes:
      - ./test-results:/test-results
    profiles:
      - test

  # Playwright E2E tests — full pipeline: sync → DB → dashboard
  # Step 1: docker compose run --rm sync-seed   (writes mock data to shared volume)
  # Step 2: docker compose run --rm playwright-storage   (reads from shared volume)
  playwright-storage:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        mode: playwright
    environment:
      - NUXT_PUBLIC_IS_DATA_MOCKED=false
      - NUXT_PUBLIC_SCOPE=organization
      - NUXT_PUBLIC_GITHUB_ORG=storage-test-org
      - NUXT_SESSION_PASSWORD=at_least_32_characters_long_password_here
      - ENABLE_HISTORICAL_MODE=true
      - NITRO_PORT=3000
    entrypoint: ["npx", "playwright", "test", "-c", "playwright.docker.config.ts", "--workers", "1", "--grep", "@storage"]
    volumes:
      - ./test-results:/test-results
      - sync_data:/app/.data
    profiles:
      - test

  # Seed storage with mock data (for storage pipeline E2E test)
  sync-seed:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        mode: playwright
    environment:
      - NUXT_PUBLIC_IS_DATA_MOCKED=true
      - NUXT_PUBLIC_SCOPE=organization
      - NUXT_PUBLIC_GITHUB_ORG=storage-test-org
      - NUXT_SESSION_PASSWORD=at_least_32_characters_long_password_here
      - ENABLE_HISTORICAL_MODE=true
      - NITRO_PORT=3000
    entrypoint: ["npx", "playwright", "test", "-c", "playwright.docker.config.ts", "--workers", "1", "--grep", "@seed"]
    volumes:
      - sync_data:/app/.data
    profiles:
      - test

volumes:
  postgres_data:
  sync_data:
